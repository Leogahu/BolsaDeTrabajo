<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChapaTuChamba - Oportunidades para Recién Egresados</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo" onclick="goToHome()" style="cursor: pointer;">ChapaTuChamba</div>
            <div id="headerUser"></div>
        </div>
    </header>

    <main>
        <!-- Página de Login -->
        <div id="loginPage" class="page">
            <div class="auth-container">
                <div class="card auth-card">
                    <div class="card-header">
                        <h2>Iniciar Sesión</h2>
                    </div>
                    
                    <div id="loginMessage" class="hidden"></div>
                    
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Usuario</label>
                            <input type="text" id="loginUsername" required>
                        </div>
                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
                    </form>
                    
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <p style="margin-bottom: 0.5rem;">¿No tienes cuenta?</p>
                        <button class="btn btn-secondary" onclick="showPage('registerPage')">Crear Cuenta</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Página de Registro -->
        <div id="registerPage" class="page hidden">
            <div class="auth-container">
                <div class="card auth-card">
                    <div class="auth-tabs">
                        <button class="active" onclick="switchRegisterTab('postante')">Postante</button>
                        <button onclick="switchRegisterTab('reclutador')">Reclutador</button>
                    </div>
                    
                    <div id="registerMessage" class="hidden"></div>
                    
                    <!-- Formulario Registro Postante -->
                    <form id="postanteRegisterForm" onsubmit="handlePostanteRegister(event)">
                        <div class="form-group">
                            <label>Usuario</label>
                            <input type="text" name="username" required>
                        </div>
                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" name="nombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" name="telefono" required>
                        </div>
                        <div class="form-group">
                            <label>Carrera</label>
                            <input type="text" name="carrera" required>
                        </div>
                        <div class="form-group">
                            <label>Subir CV (PDF)</label>
                            <input type="file" name="cvFile" accept=".pdf">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
                    </form>
                    
                    <!-- Formulario Registro Reclutador -->
                    <form id="reclutadorRegisterForm" class="hidden" onsubmit="handleReclutadorRegister(event)">
                        <div class="form-group">
                            <label>Usuario</label>
                            <input type="text" name="username" required>
                        </div>
                        <div class="form-group">
                            <label>Contraseña</label>
                            <input type="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" name="nombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Empresa</label>
                            <input type="text" name="empresa" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
                    </form>
                    
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <button class="btn btn-secondary" onclick="showPage('loginPage')">Ya tengo cuenta</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Postante -->
        <div id="dashboardPage" class="page hidden">
            <div class="container">
                <div class="filters">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Buscar por palabras clave...">
                        <button class="btn btn-primary" onclick="loadPage(0)">Buscar</button>
                    </div>
                </div>
                
                <div class="job-list" id="jobList"></div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>

        <!-- Mi Perfil -->
        <div id="perfilPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Mi Perfil</h2>
                        <button class="btn btn-secondary" onclick="goBack()">← Volver</button>
                    </div>
                    <form id="perfilForm" onsubmit="handleUpdateProfile(event)">
                        <div class="form-group">
                            <label>Usuario</label>
                            <input type="text" id="profileUsername" disabled>
                        </div>
                        <div class="form-group">
                            <label>Nueva Contraseña (dejar vacío si no cambia)</label>
                            <input type="password" id="profilePassword">
                        </div>
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="profileNombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" id="profileTelefono" required>
                        </div>
                        <div class="form-group">
                            <label>Carrera</label>
                            <input type="text" id="profileCarrera" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Mi Perfil Reclutador -->
        <div id="perfilReclutadorPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Mi Perfil</h2>
                        <button class="btn btn-secondary" onclick="goBack()">← Volver</button>
                    </div>
                    <form id="perfilReclutadorForm" onsubmit="handleUpdateReclutadorProfile(event)">
                        <div class="form-group">
                            <label>Usuario</label>
                            <input type="text" id="profileRUsername" disabled>
                        </div>
                        <div class="form-group">
                            <label>Nueva Contraseña (dejar vacío si no cambia)</label>
                            <input type="password" id="profileRPassword">
                        </div>
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="profileRNombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profileREmail" required>
                        </div>
                        <div class="form-group">
                            <label>Empresa</label>
                            <input type="text" id="profileREmpresa" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Mis Postulaciones -->
        <div id="misPostulacionesPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Mis Postulaciones</h2>
                        <button class="btn btn-secondary" onclick="goBack()">← Volver</button>
                    </div>
                    <div id="myApplications">
                        <p style="text-align: center; padding: 2rem;">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Habilidades Verificadas -->
        <div id="habilidadesPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Mis Habilidades</h2>
                        <button class="btn btn-secondary" onclick="goBack()">← Volver</button>
                    </div>
                    <div class="form-group">
                        <label>Agregar nueva habilidad</label>
                        <div style="display: flex; gap: 0.5rem;">
                            <input type="text" id="newSkill" placeholder="Nombre de la habilidad">
                            <button class="btn btn-primary" onclick="addSkill()">Agregar</button>
                        </div>
                    </div>
                    <div class="skills-list" id="skillsList"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard Reclutador -->
        <div id="reclutadorPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header">
                        <h2>Publicar Nueva Oferta</h2>
                    </div>
                    <form onsubmit="handleCreatePostulacion(event)">
                        <div class="form-group">
                            <label>Título del puesto</label>
                            <input type="text" id="jobTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Descripción</label>
                            <textarea id="jobDescription" rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Requisitos</label>
                            <textarea id="jobRequirements" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Ubicación</label>
                            <input type="text" id="jobLocation" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Publicar Oferta</button>
                    </form>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h2>Mis Ofertas Publicadas</h2>
                    </div>
                    <div id="myJobs">
                        <p style="text-align: center; padding: 2rem;">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ver Candidatos -->
        <div id="candidatesPage" class="page hidden">
            <div class="container">
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>Candidatos</h2>
                        <button class="btn btn-secondary" onclick="goBack()">← Volver</button>
                    </div>
                    <div id="candidatesList">
                        <p style="text-align: center; padding: 2rem;">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/applications.js"></script>
    <script src="js/skills.js"></script>
</body>
ñ
